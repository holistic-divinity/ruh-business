<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUH — Business Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --burgundy:       #6B1F30;
      --burgundy-mid:   #8B2841;
      --burgundy-pale:  #C4829A;
      --sage:           #6B8F71;
      --sage-light:     #8FAF8B;
      --sage-pale:      #C8DEC9;
      --amber:          #C17B41;
      --amber-light:    #D4944F;
      --terracotta:     #B85C38;
      --cream:          #F8F4EE;
      --cream-dark:     #EDE6D8;
      --text-dark:      #2C1810;
      --text-mid:       #5C3D2A;
      --text-light:     #8B7355;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--burgundy);
      color: var(--cream);
      padding: 2rem 2.5rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      line-height: 1;
    }
    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--burgundy-pale);
      margin-top: 0.25rem;
    }
    .phase-badge {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.45rem 1rem;
      border-radius: 2px;
      color: var(--cream);
    }
    .workbook-link {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 0.45rem 1rem;
      border-radius: 2px;
      color: var(--cream);
      text-decoration: none;
      transition: background 0.2s;
    }
    .workbook-link:hover { background: rgba(255,255,255,0.18); }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    /* ── MONTH NAV ── */
    .month-nav {
      display: flex;
      gap: 0;
      padding: 0 2.5rem;
      background: var(--cream-dark);
      border-bottom: 1px solid rgba(107,31,48,0.12);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .month-nav::-webkit-scrollbar { display: none; }
    .month-btn {
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 1rem 1.25rem;
      cursor: pointer;
      color: var(--text-light);
      white-space: nowrap;
      transition: all 0.2s;
    }
    .month-btn:hover { color: var(--text-dark); }
    .month-btn.active {
      color: var(--burgundy);
      border-bottom-color: var(--burgundy);
      font-weight: 600;
    }

    /* ── CALENDAR ── */
    .calendar-wrap {
      padding: 2rem 2.5rem;
      max-width: 1100px;
    }
    .calendar-month-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }
    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .cal-header-cell {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
      padding: 0.5rem 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day {
      min-height: 80px;
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 3px;
      padding: 0.5rem;
      position: relative;
      transition: all 0.15s;
    }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .cal-day.weekend {
      background: var(--cream-dark);
      opacity: 0.6;
    }
    .cal-day.has-tasks {
      cursor: pointer;
      border-color: rgba(107,31,48,0.15);
    }
    .cal-day.has-tasks:hover {
      border-color: var(--burgundy-mid);
      box-shadow: 0 2px 12px rgba(107,31,48,0.12);
      transform: translateY(-1px);
    }
    .cal-day.today {
      border-color: var(--burgundy);
      background: #FDF5F7;
    }
    .day-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--text-mid);
    }
    .cal-day.today .day-num { color: var(--burgundy); font-weight: 600; }
    .cal-day.weekend .day-num { color: var(--text-light); }
    .day-peek {
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--text-light);
      margin-top: 0.3rem;
      line-height: 1.4;
    }
    .day-dot {
      width: 5px;
      height: 5px;
      background: var(--burgundy-pale);
      border-radius: 50%;
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
    }
    .cal-day.has-tasks .day-dot { background: var(--burgundy); }
    .rest-label {
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 0.4rem;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,0.55);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--cream);
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      border-radius: 8px 8px 0 0;
      overflow-y: auto;
      padding: 2rem 2.5rem 3rem;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    .modal-date-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text-dark);
    }
    .modal-phase-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.75rem;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-light);
      cursor: pointer;
      line-height: 1;
      padding: 0 0 0 1rem;
    }
    .close-btn:hover { color: var(--text-dark); }

    /* time blocks */
    .block {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.85rem;
      align-items: flex-start;
    }
    .block-time {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-light);
      white-space: nowrap;
      min-width: 100px;
      padding-top: 0.2rem;
    }
    .block-body {
      flex: 1;
      border-left: 3px solid var(--cream-dark);
      padding-left: 0.85rem;
    }
    .block-title {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .block-desc {
      font-size: 0.76rem;
      color: var(--text-mid);
      line-height: 1.55;
    }
    .block.cat-admin    .block-body { border-color: var(--burgundy-mid); }
    .block.cat-research .block-body { border-color: var(--sage); }
    .block.cat-creative .block-body { border-color: var(--amber); }
    .block.cat-product  .block-body { border-color: var(--terracotta); }
    .block.cat-content  .block-body { border-color: var(--sage-light); }
    .block.cat-business .block-body { border-color: #7B8FA1; }
    .block.cat-build    .block-body { border-color: #5B6B7A; }
    .block.cat-break    .block-body { border-color: var(--cream-dark); }

    .block.cat-admin    .block-title { color: var(--burgundy); }
    .block.cat-research .block-title { color: var(--sage); }
    .block.cat-creative .block-title { color: var(--amber); }
    .block.cat-product  .block-title { color: var(--terracotta); }
    .block.cat-content  .block-title { color: #5B8272; }
    .block.cat-business .block-title { color: #5B6B7A; }
    .block.cat-build    .block-title { color: #4A5B6A; }
    .block.cat-break    .block-title { color: var(--text-light); }

    .divider {
      border: none;
      border-top: 1px solid var(--cream-dark);
      margin: 1.25rem 0;
    }

    /* task check-off */
    .task-check {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 1.5px solid rgba(107,31,48,0.25);
      border-radius: 3px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: white;
      padding: 0;
      margin-top: 0.15rem;
      transition: all 0.15s;
    }
    .task-check:hover { border-color: var(--burgundy); }
    .task-check.checked { background: var(--burgundy); border-color: var(--burgundy); }
    .block.done .block-title { text-decoration: line-through; opacity: 0.45; }
    .block.done .block-desc  { opacity: 0.35; }
    .block.done .block-time  { opacity: 0.35; }
    .modal-progress {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.5rem;
    }
    .modal-progress span { color: var(--burgundy); font-weight: 600; }

    /* per-day progress bar */
    .day-progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(107,31,48,0.08);
      border-radius: 0 0 3px 3px;
      overflow: hidden;
    }
    .day-progress-bar {
      height: 100%;
      background: var(--burgundy);
      transition: width 0.3s ease;
    }
    .cal-day.all-done { background: #f6fbf7; }
    .cal-day.all-done .day-dot { background: var(--sage); }
    .cal-day.all-done .day-num { color: var(--sage); }

    /* legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--cream-dark);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding: 0;
    }
    .calendar-wrap {
      flex: 1;
      min-width: 0;
      padding: 2rem 2.5rem;
    }
    .legend {
      padding-left: 2.5rem;
    }

    /* ── JOURNAL ── */
    .journal-panel {
      width: 300px;
      min-width: 300px;
      background: white;
      border-left: 1px solid var(--cream-dark);
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
    }
    .journal-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--burgundy);
      margin-bottom: 0.25rem;
    }
    .journal-subheading {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.25rem;
    }
    .journal-date-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
    .journal-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--cream);
      border: 1px solid var(--cream-dark);
      border-radius: 3px;
      padding: 0.85rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text-dark);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .journal-textarea:focus {
      border-color: rgba(107,31,48,0.3);
    }
    .journal-save-btn {
      margin-top: 0.75rem;
      width: 100%;
      background: var(--burgundy);
      color: var(--cream);
      border: none;
      padding: 0.6rem 1rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .journal-save-btn:hover { background: var(--burgundy-mid); }
    .journal-saved-msg {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--sage);
      text-align: center;
      margin-top: 0.4rem;
      min-height: 1rem;
    }
    .journal-divider {
      border: none;
      border-top: 1px solid var(--cream-dark);
      margin: 1.25rem 0;
    }
    .journal-entries-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.75rem;
    }
    .journal-entries {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      flex: 1;
    }
    .journal-entry {
      background: var(--cream);
      border: 1px solid var(--cream-dark);
      border-radius: 3px;
      padding: 0.85rem;
    }
    .journal-entry-date {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--burgundy-pale);
      margin-bottom: 0.4rem;
    }
    .journal-entry-text {
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text-mid);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .journal-entry-delete {
      background: none;
      border: none;
      font-size: 0.6rem;
      color: var(--text-light);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      padding: 0;
      opacity: 0.6;
    }
    .journal-entry-delete:hover { opacity: 1; color: var(--burgundy); }
    .journal-empty {
      font-size: 0.75rem;
      color: var(--text-light);
      font-style: italic;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .main-layout { flex-direction: column; }
      .journal-panel { width: 100%; min-width: 0; border-left: none; border-top: 1px solid var(--cream-dark); min-height: auto; }
    }
    @media (max-width: 600px) {
      header { padding: 1.5rem; }
      .calendar-wrap { padding: 1.25rem; }
      .month-nav { padding: 0 1rem; }
      .modal-box { padding: 1.5rem 1.5rem 2.5rem; }
      .block-time { min-width: 80px; }
      .legend { padding-left: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand-name">RUH</div>
    <div class="brand-sub">Business Planner</div>
  </div>
  <div class="header-right">
    <div class="phase-badge" id="currentPhaseBadge">Phase 1 — Brand Foundation</div>
    <a href="workbook.html" class="workbook-link">Workbook →</a>
  </div>
</header>

<nav class="month-nav" id="monthNav"></nav>

<div class="main-layout">

  <div>
    <div class="calendar-wrap">
      <div class="calendar-month-label" id="calMonthLabel"></div>
      <div class="cal-header">
        <div class="cal-header-cell">Mon</div>
        <div class="cal-header-cell">Tue</div>
        <div class="cal-header-cell">Wed</div>
        <div class="cal-header-cell">Thu</div>
        <div class="cal-header-cell">Fri</div>
        <div class="cal-header-cell">Sat</div>
        <div class="cal-header-cell">Sun</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#8B2841"></div> Admin</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6B8F71"></div> Research</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C17B41"></div> Creative</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B85C38"></div> Product</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8FAF8B"></div> Content</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B8FA1"></div> Business</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5B6B7A"></div> Website Build</div>
    </div>
  </div>

  <!-- Journal Panel -->
  <div class="journal-panel">
    <div class="journal-heading">Journal</div>
    <div class="journal-subheading">Ruh — Private Notes</div>
    <div class="journal-date-label" id="journalTodayLabel"></div>
    <textarea class="journal-textarea" id="journalInput" placeholder="Write here — thoughts, observations, questions, feelings about today..."></textarea>
    <button class="journal-save-btn" id="journalSaveBtn">Save Entry</button>
    <div class="journal-saved-msg" id="journalSavedMsg"></div>
    <hr class="journal-divider">
    <div class="journal-entries-label">Previous Entries</div>
    <div class="journal-entries" id="journalEntries"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-top">
      <div>
        <div class="modal-date-label" id="modalDateLabel"></div>
        <div class="modal-phase-label" id="modalPhaseLabel"></div>
      </div>
      <button class="close-btn" id="closeModal">×</button>
    </div>
    <div id="modalBlocks"></div>
  </div>
</div>

<script>

      { time: "09:15 – 10:30", task: "Essential Oil Safety", desc: "Go to tisserandinstitute.org. Read their essential oil safety guidelines. Understand: dilution rates for face vs body vs bath, phototoxic oils (citrus), sensitising oils, and which oils to avoid in pregnancy. This is non-negotiable safety knowledge.", cat: "research" },

      { time: "12:00 – 13:00", task: "Shelf Life and Stability", desc: "Research how to test shelf life at home (heat stress testing, observation logs). Understand rancidity in oils, CPSR (Cosmetic Product Safety Report), and PAO symbols. Start your stability tracking template.", cat: "research" },
      { time: "13:00 – 14:00", task: "Lunch", desc: "Rest completely.", cat: "break" },
      { time: "14:00 – 15:30", task: "Ingredient Research — Butters + Actives", desc: "Research: shea butter (Shea Belt, West African women's cooperatives), mango butter, aloe vera, rose hydrosol, sea buckthorn, centella asiatica (Ayurvedic tradition), oat extract, willow bark extract, bakuchiol (Babchi plant, Ayurvedic), vitamin E. INCI names, origins, usage rates. Document in Workbook.", cat: "research" },
      { time: "15:30 – 16:00", task: "First Ruh Mood Board", desc: "Open Pinterest, create a board called 'Ruh'. Pull images that feel like Ruh — not product images, but feelings. Textures, light, botanicals, earthy colours, sacred spaces, ritual. Minimum 20 pins.", cat: "creative" }

      { time: "09:15 – 11:00", task: "Melt and Pour Soap Making Theory", desc: "Study melt and pour soap making: what M&P base is and how it's made, how to choose the right base for each soap (shea butter base, goat milk base, hemp base, clear glycerin), what you can and cannot add and at what temperatures (botanicals, clays, natural colourants, exfoliants, essential oils), pouring technique, layering and swirling, unmoulding timelines. Brambleberry and Lovin Soap Studio are good resources. No lye involved — this is your method.", cat: "research" },

      { time: "11:15 – 13:00", task: "Tea Blending Foundations — Your Confirmed Blends", desc: "Study the craft of blending specifically for your confirmed tea range. Understand: how base herbs (rooibos, honeybush, chamomile) work as the body of a blend, how middle and top notes function in herbal tea the same way they do in perfume, how to balance flavour and therapeutic function, brewing ratios and steep times. Use your tea herb research from June 2 as your reference. Draft rough proportions for 2 of your confirmed tea blends.", cat: "research" },

      { time: "15:30 – 16:00", task: "Day Review", desc: "Note anything that came up during the tea entry session — anything you want to research further or blends that are forming in your mind.", cat: "break" }

  "2026-06-11": {

      { time: "09:15 – 11:00", task: "Face Cream + Body Butter Recipe Research", desc: "Study both formulation types in one session. Face cream: emulsion theory (oil phase, water phase, natural emulsifier, actives), look at example structures on Formula Botanica, draft a rough recipe using your confirmed ingredients. Body butter: anhydrous formulation (no water, no preservative needed), butter-to-oil ratios, whipped vs solid texture. Draft a rough recipe for each. These are first drafts — you'll refine through testing.", cat: "product" },

      { time: "11:15 – 13:00", task: "Ingredient Library Entry — Tinctured Serum Ingredients", desc: "Enter all your tinctured serum research from June 9 into the Workbook Ingredient Library. For each ingredient: botanical origin, traditional use, skin benefits, usage rate in oil-based formulas, contraindications, SA source. Focus on the herbal botanicals — comfrey, blue tansy, green tea, neem, pomegranate, argan. After this session, every confirmed Ruh ingredient has a full Library entry.", cat: "product" },

      { time: "14:00 – 15:30", task: "Tinctured Serum Recipe Research", desc: "Ruh tinctured serums are oil-based — no water, no emulsifiers, no synthetic preservatives needed. Study layering logic: dry oils (rosehip, marula) absorb fastest and go first, medium oils (jojoba) form the carrier base, heavier actives (sea buckthorn, vitamin E, infused oils) go in last. Research recommended percentages for each layer type. Draft rough recipes for 2 of your confirmed tinctured serums.", cat: "product" },

    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === currentMonthIdx ? ' active' : '');
    btn.textContent = m.label;
    btn.addEventListener('click', () => { currentMonthIdx = i; renderCalendar(); buildNav(); });
    nav.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
//  RENDER CALENDAR
// ─────────────────────────────────────────────
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  const { year, month, label } = months[currentMonthIdx];
  document.getElementById('calMonthLabel').textContent = label;

  // Find phase for badge
  const firstDayOfMonth = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const phaseEntries = Object.entries(schedule).filter(([d]) => d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  if (phaseEntries.length > 0) {
    document.getElementById('currentPhaseBadge').textContent = phaseEntries[0][1].phase;
  }

  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Empty cells before first day
  for (let e = 0; e < startDow; e++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (startDow + d - 1) % 7; // 0=Mon 6=Sun
    const isWeekend = dow >= 5;
    const isToday = (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d);
    const dayData = schedule[dateStr];

    const cell = document.createElement('div');
    cell.className = 'cal-day';
    cell.dataset.date = dateStr;
    if (isWeekend) cell.classList.add('weekend');
    if (isToday) cell.classList.add('today');
    if (dayData) cell.classList.add('has-tasks');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const dot = document.createElement('div');
    dot.className = 'day-dot';
    cell.appendChild(dot);

    if (isWeekend) {
      const rest = document.createElement('div');
      rest.className = 'rest-label';
      rest.textContent = 'Rest';
      cell.appendChild(rest);
    } else if (dayData) {
      const peek = document.createElement('div');
      peek.className = 'day-peek';
      peek.textContent = dayData.tasks[1]?.task || dayData.tasks[0]?.task || '';
      cell.appendChild(peek);

      const doneSoFar = (loadDone()[dateStr] || []).length;
      const totalTasks = dayData.tasks.length;
      if (doneSoFar === totalTasks && totalTasks > 0) cell.classList.add('all-done');
      const prog = document.createElement('div');
      prog.className = 'day-progress';
      prog.innerHTML = `<div class="day-progress-bar" style="width:${totalTasks ? doneSoFar / totalTasks * 100 : 0}%"></div>`;
      cell.appendChild(prog);

      cell.addEventListener('click', () => openModal(dateStr, d, month, year, dayData));
    }

    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────────
//  TASK COMPLETION
// ─────────────────────────────────────────────

const DONE_KEY = 'ruh_tasks_done';
function loadDone() { try { return JSON.parse(localStorage.getItem(DONE_KEY)) || {}; } catch { return {}; } }
function saveDone(d) { localStorage.setItem(DONE_KEY, JSON.stringify(d)); }
function toggleTask(dateStr, idx) {
  const done = loadDone();
  if (!done[dateStr]) done[dateStr] = [];
  const pos = done[dateStr].indexOf(idx);
  if (pos === -1) done[dateStr].push(idx); else done[dateStr].splice(pos, 1);
  saveDone(done);
}
function isDone(dateStr, idx) { const d = loadDone(); return d[dateStr] ? d[dateStr].includes(idx) : false; }
function updateCellProgress(dateStr, dayData) {
  const cell = document.querySelector(`[data-date="${dateStr}"]`);
  if (!cell) return;
  const done = loadDone();
  const doneCount = (done[dateStr] || []).length;
  const total = dayData.tasks.length;
  const bar = cell.querySelector('.day-progress-bar');
  if (bar) bar.style.width = total ? `${doneCount / total * 100}%` : '0%';
  cell.classList.toggle('all-done', total > 0 && doneCount === total);
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(dateStr, d, month, year, dayData) {
  const dayOfWeek = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dow = new Date(year, month, d).getDay();

  document.getElementById('modalDateLabel').textContent =
    `${dayOfWeek[dow]}, ${d} ${MONTH_NAMES[month]} ${year}`;
  document.getElementById('modalPhaseLabel').textContent = dayData.phase;

  const blocksEl = document.getElementById('modalBlocks');
  blocksEl.innerHTML = '';

  const doneArr = loadDone()[dateStr] || [];
  const total = dayData.tasks.length;
  const doneCount = doneArr.length;

  const progEl = document.createElement('div');
  progEl.className = 'modal-progress';
  progEl.id = 'modalProgress';
  progEl.innerHTML = doneCount === total && total > 0
    ? `<span>All done</span> — ${total} tasks completed`
    : `<span>${doneCount}</span> of ${total} tasks completed`;
  blocksEl.appendChild(progEl);

  dayData.tasks.forEach((t, i) => {
    if (i > 0) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      blocksEl.appendChild(hr);
    }
    const done = isDone(dateStr, i);
    const block = document.createElement('div');
    block.className = `block cat-${t.cat}${done ? ' done' : ''}`;
    block.innerHTML = `
      <button class="task-check${done ? ' checked' : ''}" aria-label="Mark done">${done ? '✓' : ''}</button>
      <div class="block-time">${t.time}</div>
      <div class="block-body">
        <div class="block-title">${t.task}</div>
        <div class="block-desc">${t.desc}</div>
      </div>`;
    block.querySelector('.task-check').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleTask(dateStr, i);
      const nowDone = isDone(dateStr, i);
      block.classList.toggle('done', nowDone);
      const btn = e.currentTarget;
      btn.classList.toggle('checked', nowDone);
      btn.textContent = nowDone ? '✓' : '';
      updateCellProgress(dateStr, dayData);
      const d2 = loadDone()[dateStr] || [];
      const dc = d2.length;
      const p = document.getElementById('modalProgress');
      if (p) p.innerHTML = dc === total && total > 0
        ? `<span>All done</span> — ${total} tasks completed`
        : `<span>${dc}</span> of ${total} tasks completed`;
    });
    blocksEl.appendChild(block);
  });

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('closeModal').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────

// Auto-select current month
const todayMonthIdx = months.findIndex(m => m.year === today.getFullYear() && m.month === today.getMonth());
if (todayMonthIdx >= 0) currentMonthIdx = todayMonthIdx;

buildNav();
renderCalendar();

// ─────────────────────────────────────────────
//  JOURNAL
// ─────────────────────────────────────────────
const JOURNAL_KEY = 'ruh_journal_entries';
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function journalDateStr(d) {
  return `${DAY_FULL[d.getDay()]}, ${d.getDate()} ${MONTH_FULL[d.getMonth()]} ${d.getFullYear()}`;
}

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(JOURNAL_KEY)) || []; }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries));
}

function renderEntries() {
  const entries = loadEntries();
  const container = document.getElementById('journalEntries');
  container.innerHTML = '';
  if (entries.length === 0) {
    container.innerHTML = '<div class="journal-empty">Your entries will appear here. Write something — even one line counts.</div>';
    return;
  }
  [...entries].reverse().forEach((entry, idx) => {
    const realIdx = entries.length - 1 - idx;
    const el = document.createElement('div');
    el.className = 'journal-entry';
    el.innerHTML = `
      <div class="journal-entry-date">${entry.date}</div>
      <div class="journal-entry-text">${entry.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <button class="journal-entry-delete" data-idx="${realIdx}">Delete</button>
    `;
    container.appendChild(el);
  });
  container.querySelectorAll('.journal-entry-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const entries = loadEntries();
      entries.splice(parseInt(btn.dataset.idx), 1);
      saveEntries(entries);
      renderEntries();
    });
  });
}

// Set today label
document.getElementById('journalTodayLabel').textContent = journalDateStr(today);

// Save button
document.getElementById('journalSaveBtn').addEventListener('click', () => {
  const text = document.getElementById('journalInput').value.trim();
  if (!text) return;
  const entries = loadEntries();
  entries.push({ date: journalDateStr(today), text });
  saveEntries(entries);
  document.getElementById('journalInput').value = '';
  const msg = document.getElementById('journalSavedMsg');
  msg.textContent = 'Entry saved.';
  setTimeout(() => msg.textContent = '', 2000);
  renderEntries();
});

renderEntries();
</script>
