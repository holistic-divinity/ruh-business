<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUH — Business Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --burgundy:       #6B1F30;
      --burgundy-mid:   #8B2841;
      --burgundy-pale:  #C4829A;
      --sage:           #6B8F71;
      --sage-light:     #8FAF8B;
      --sage-pale:      #C8DEC9;
      --amber:          #C17B41;
      --amber-light:    #D4944F;
      --terracotta:     #B85C38;
      --cream:          #F8F4EE;
      --cream-dark:     #EDE6D8;
      --text-dark:      #2C1810;
      --text-mid:       #5C3D2A;
      --text-light:     #8B7355;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--burgundy);
      color: var(--cream);
      padding: 2rem 2.5rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      line-height: 1;
    }
    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--burgundy-pale);
      margin-top: 0.25rem;
    }
    .phase-badge {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.45rem 1rem;
      border-radius: 2px;
      color: var(--cream);
    }

    /* ── MONTH NAV ── */
    .month-nav {
      display: flex;
      gap: 0;
      padding: 0 2.5rem;
      background: var(--cream-dark);
      border-bottom: 1px solid rgba(107,31,48,0.12);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .month-nav::-webkit-scrollbar { display: none; }
    .month-btn {
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 1rem 1.25rem;
      cursor: pointer;
      color: var(--text-light);
      white-space: nowrap;
      transition: all 0.2s;
    }
    .month-btn:hover { color: var(--text-dark); }
    .month-btn.active {
      color: var(--burgundy);
      border-bottom-color: var(--burgundy);
      font-weight: 600;
    }

    /* ── CALENDAR ── */
    .calendar-wrap {
      padding: 2rem 2.5rem;
      max-width: 1100px;
    }
    .calendar-month-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }
    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .cal-header-cell {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
      padding: 0.5rem 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day {
      min-height: 80px;
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 3px;
      padding: 0.5rem;
      position: relative;
      transition: all 0.15s;
    }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .cal-day.weekend {
      background: var(--cream-dark);
      opacity: 0.6;
    }
    .cal-day.has-tasks {
      cursor: pointer;
      border-color: rgba(107,31,48,0.15);
    }
    .cal-day.has-tasks:hover {
      border-color: var(--burgundy-mid);
      box-shadow: 0 2px 12px rgba(107,31,48,0.12);
      transform: translateY(-1px);
    }
    .cal-day.today {
      border-color: var(--burgundy);
      background: #FDF5F7;
    }
    .day-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--text-mid);
    }
    .cal-day.today .day-num { color: var(--burgundy); font-weight: 600; }
    .cal-day.weekend .day-num { color: var(--text-light); }
    .day-peek {
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--text-light);
      margin-top: 0.3rem;
      line-height: 1.4;
    }
    .day-dot {
      width: 5px;
      height: 5px;
      background: var(--burgundy-pale);
      border-radius: 50%;
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
    }
    .cal-day.has-tasks .day-dot { background: var(--burgundy); }
    .rest-label {
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 0.4rem;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,0.55);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--cream);
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      border-radius: 8px 8px 0 0;
      overflow-y: auto;
      padding: 2rem 2.5rem 3rem;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    .modal-date-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text-dark);
    }
    .modal-phase-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.75rem;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-light);
      cursor: pointer;
      line-height: 1;
      padding: 0 0 0 1rem;
    }
    .close-btn:hover { color: var(--text-dark); }

    /* time blocks */
    .block {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.85rem;
      align-items: flex-start;
    }
    .block-time {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-light);
      white-space: nowrap;
      min-width: 100px;
      padding-top: 0.2rem;
    }
    .block-body {
      flex: 1;
      border-left: 3px solid var(--cream-dark);
      padding-left: 0.85rem;
    }
    .block-title {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .block-desc {
      font-size: 0.76rem;
      color: var(--text-mid);
      line-height: 1.55;
    }
    .block.cat-admin    .block-body { border-color: var(--burgundy-mid); }
    .block.cat-research .block-body { border-color: var(--sage); }
    .block.cat-creative .block-body { border-color: var(--amber); }
    .block.cat-product  .block-body { border-color: var(--terracotta); }
    .block.cat-content  .block-body { border-color: var(--sage-light); }
    .block.cat-business .block-body { border-color: #7B8FA1; }
    .block.cat-build    .block-body { border-color: #5B6B7A; }
    .block.cat-break    .block-body { border-color: var(--cream-dark); }

    .block.cat-admin    .block-title { color: var(--burgundy); }
    .block.cat-research .block-title { color: var(--sage); }
    .block.cat-creative .block-title { color: var(--amber); }
    .block.cat-product  .block-title { color: var(--terracotta); }
    .block.cat-content  .block-title { color: #5B8272; }
    .block.cat-business .block-title { color: #5B6B7A; }
    .block.cat-build    .block-title { color: #4A5B6A; }
    .block.cat-break    .block-title { color: var(--text-light); }

    .divider {
      border: none;
      border-top: 1px solid var(--cream-dark);
      margin: 1.25rem 0;
    }

    /* legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--cream-dark);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    @media (max-width: 600px) {
      header { padding: 1.5rem; }
      .calendar-wrap { padding: 1.25rem; }
      .month-nav { padding: 0 1rem; }
      .modal-box { padding: 1.5rem 1.5rem 2.5rem; }
      .block-time { min-width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand-name">RUH</div>
    <div class="brand-sub">Business Planner</div>
  </div>
  <div class="phase-badge" id="currentPhaseBadge">Phase 1 — Brand Foundation</div>
</header>

<nav class="month-nav" id="monthNav"></nav>

<div class="calendar-wrap">
  <div class="calendar-month-label" id="calMonthLabel"></div>
  <div class="cal-header">
    <div class="cal-header-cell">Mon</div>
    <div class="cal-header-cell">Tue</div>
    <div class="cal-header-cell">Wed</div>
    <div class="cal-header-cell">Thu</div>
    <div class="cal-header-cell">Fri</div>
    <div class="cal-header-cell">Sat</div>
    <div class="cal-header-cell">Sun</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#8B2841"></div> Admin</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6B8F71"></div> Research</div>
  <div class="legend-item"><div class="legend-dot" style="background:#C17B41"></div> Creative</div>
  <div class="legend-item"><div class="legend-dot" style="background:#B85C38"></div> Product</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8FAF8B"></div> Content</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7B8FA1"></div> Business</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5B6B7A"></div> Website Build</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-top">
      <div>
        <div class="modal-date-label" id="modalDateLabel"></div>
        <div class="modal-phase-label" id="modalPhaseLabel"></div>
      </div>
      <button class="close-btn" id="closeModal">×</button>
    </div>
    <div id="modalBlocks"></div>
  </div>
</div>

<script>

      { time: "09:45 – 10:15", task: "Register ruhapothecary.co.za", desc: "Go to domains.co.za, search ruhapothecary.co.za and ruhapothecary.com, and register both. This is non-negotiable today.", cat: "admin" },

      { time: "10:30 – 13:00", task: "Write the Ruh Brand Vision Document", desc: "Open a Google Doc titled 'Ruh — Brand Vision'. Write out: the brand soul, the making ritual, the ideal customer (the awakening woman), the tiered experience, what Ruh refuses to be. Use everything from today's session with Claude. Ask Claude to help structure it.", cat: "creative" },

      { time: "13:00 – 14:00", task: "Lunch", desc: "Rest completely.", cat: "break" },
      { time: "14:00 – 15:30", task: "Brand Reference Research", desc: "Find 8 brands you genuinely love — not necessarily skincare. Study each one: what does the name feel like, how do they use colour and typography, what does their packaging say before you even read it? Write notes.", cat: "research" },
      { time: "15:30 – 16:00", task: "Day Review", desc: "What did you learn today that surprised you? Write it down.", cat: "break" }

// ─────────────────────────────────────────────
//  MONTHS CONFIGURATION
// ─────────────────────────────────────────────
const months = [
  { year: 2026, month: 4,  label: "May 2026" },
  { year: 2026, month: 5,  label: "June 2026" },
  { year: 2026, month: 6,  label: "July 2026" },
  { year: 2026, month: 7,  label: "August 2026" },
  { year: 2026, month: 8,  label: "September 2026" },
  { year: 2026, month: 9,  label: "October 2026" }
];

let currentMonthIdx = 0;
const today = new Date();

// ─────────────────────────────────────────────
//  BUILD MONTH NAV
// ─────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = '';
  months.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === currentMonthIdx ? ' active' : '');
    btn.textContent = m.label;
    btn.addEventListener('click', () => { currentMonthIdx = i; renderCalendar(); buildNav(); });
    nav.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
//  RENDER CALENDAR
// ─────────────────────────────────────────────
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  const { year, month, label } = months[currentMonthIdx];
  document.getElementById('calMonthLabel').textContent = label;

  // Find phase for badge
  const firstDayOfMonth = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const phaseEntries = Object.entries(schedule).filter(([d]) => d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  if (phaseEntries.length > 0) {
    document.getElementById('currentPhaseBadge').textContent = phaseEntries[0][1].phase;
  }

  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Empty cells before first day
  for (let e = 0; e < startDow; e++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (startDow + d - 1) % 7; // 0=Mon 6=Sun
    const isWeekend = dow >= 5;
    const isToday = (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d);
    const dayData = schedule[dateStr];

    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (isWeekend) cell.classList.add('weekend');
    if (isToday) cell.classList.add('today');
    if (dayData) cell.classList.add('has-tasks');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const dot = document.createElement('div');
    dot.className = 'day-dot';
    cell.appendChild(dot);

    if (isWeekend) {
      const rest = document.createElement('div');
      rest.className = 'rest-label';
      rest.textContent = 'Rest';
      cell.appendChild(rest);
    } else if (dayData) {
      const peek = document.createElement('div');
      peek.className = 'day-peek';
      peek.textContent = dayData.tasks[1]?.task || dayData.tasks[0]?.task || '';
      cell.appendChild(peek);
      cell.addEventListener('click', () => openModal(dateStr, d, month, year, dayData));
    }

    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(dateStr, d, month, year, dayData) {
  const dayOfWeek = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dow = new Date(year, month, d).getDay();

  document.getElementById('modalDateLabel').textContent =
    `${dayOfWeek[dow]}, ${d} ${MONTH_NAMES[month]} ${year}`;
  document.getElementById('modalPhaseLabel').textContent = dayData.phase;

  const blocksEl = document.getElementById('modalBlocks');
  blocksEl.innerHTML = '';

  dayData.tasks.forEach((t, i) => {
    if (i > 0) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      blocksEl.appendChild(hr);
    }
    const block = document.createElement('div');
    block.className = `block cat-${t.cat}`;
    block.innerHTML = `
      <div class="block-time">${t.time}</div>
      <div class="block-body">
        <div class="block-title">${t.task}</div>
        <div class="block-desc">${t.desc}</div>
      </div>`;
    blocksEl.appendChild(block);
  });

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('closeModal').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────

// Auto-select current month
const todayMonthIdx = months.findIndex(m => m.year === today.getFullYear() && m.month === today.getMonth());
if (todayMonthIdx >= 0) currentMonthIdx = todayMonthIdx;

buildNav();
renderCalendar();
</script>
